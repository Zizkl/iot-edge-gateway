server:
  port: 8080

spring:
  application:
    name: iot-edge-gateway
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/iot_edge_gateway?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

gateway:
  tcp:
    enabled: true
    port: 9000
  sync:
    batch-size: 100
    max-retry-count: 5
    remote-base-url: http://localhost:18080
